name: Update Macro Data

on:
  schedule:
    # 北京时间 08:00 / 16:00 / 22:00 (UTC 00:00 / 08:00 / 14:00)
    - cron: '0 0,8,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collector
        run: python scripts/collector.py
        env:
          IFIND_API_KEY: ${{ secrets.IFIND_API_KEY }}

      - name: Run build validation
        run: python scripts/build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
